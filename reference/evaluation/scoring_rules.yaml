# =====================================================================
# VCCB -- scoring_rules.yaml
# Configuration consumed by scorer.py. Read together with
# reference/ground_truth.yaml (canonical data + per-client profiles).
#
# Philosophy: every score is normalized against the EXTRACTABLE MAXIMUM
# for the client an image comes from (self-normalization). A model is
# rewarded for recovering what the image actually contains, never
# penalised for failing to recover information the render destroyed.
# =====================================================================

version: "0.1.0"

# Component weights (sum = 100).
weights:
  start: 30
  duration: 25
  title: 20
  robustness: 15
  recurrence: 10

# ---------------------------------------------------------------------
# Per-event timing components (start, duration). Bands come from the
# client profile in ground_truth.yaml. Two-tier credit: base + bonus.
# ---------------------------------------------------------------------
start:
  base_credit: 0.80          # 24 / 30  -> within start.base_tol_min (tight: +/-5)
  bonus_credit: 1.00         # 30 / 30  -> within start.bonus_tol_min (tight: +/-2)
  # Start is a TOP-EDGE reading and is precisely recoverable in every client
  # (measured top-edge accuracy < 1 min, including clamped events: Notes/TB do
  # not displace the top; Outlook's accent bar shows the true start). The bonus
  # tier is therefore achievable for all events -- clamp_displaces_start is
  # False in every profile.

duration:
  base_credit: 0.80          # 20 / 25  -> within duration base band
  bonus_credit: 1.00         # 25 / 25  -> within duration bonus band
  # Clamped events (profile: precise_time_indicator=false and
  # duration <= clamp_below_min): base band = clamped_base_band, no bonus
  # tier -> bonus removed from the denominator.

title:
  base_credit: 0.80          # 16 / 20  -> content-word recall (graded)
  id_bonus_credit: 1.00      # 20 / 20  -> exact BenchXX id additionally correct
  similarity: content_word_recall   # fuzzy per-word match, case-insensitive
  fuzzy_threshold: 0.80      # per-word similarity ratio to count as recalled
  # id bonus achievability is per image: if the id is truncated in the
  # render it is removed from the denominator. Default achievable=true
  # (clean renders show ids); refined per image during photo calibration.

# ---------------------------------------------------------------------
# All-day events: no clock start / minute duration. The start and
# duration weights are reused for day-placement and span.
# ---------------------------------------------------------------------
all_day:
  start_component: exact_start_day    # uses the 'start' weight; binary (right column)
  duration_component: exact_span      # uses the 'duration' weight; binary
  multi_day:
    # per client profile multi_day_render:
    #   span_bar       -> span directly readable; expect span == span_days
    #   per_day_banner -> accept EITHER one span event OR span_days adjacent
    #                     same-title banners (both = full span credit)
    merge_adjacent_same_title: true

# ---------------------------------------------------------------------
# Robustness (image-global). EP = error points.
# ---------------------------------------------------------------------
robustness:
  ep_per_false_negative: 1.0      # forgotten event
  ep_per_false_positive: 1.5      # hallucinated event (worse)
  formula: "weights.robustness * (1 / 3 ** EP)"   # 15 * 3^-EP
  reliability_flag: "any FP>0 or FN>0 marks the run 'unreliable extraction'"

# ---------------------------------------------------------------------
# Recurrence recognition (image-global). Achievable in ALL clients via
# the repeated-label pattern (identical title+time across Mon-Fri).
# The native recurrence icon (Outlook, Thunderbird) is an informational
# cue only -- NOT a separate scored bonus, since the output cannot reveal
# which cue the model used.
# ---------------------------------------------------------------------
recurrence:
  achievable_all_clients: true
  full_credit: "the recurring event (Bench20) is reported as a series, OR as 5
                same-title events at the same time across Mon-Fri"
  partial_credit: "fraction of the 5 instances correctly grouped / consistent"

# ---------------------------------------------------------------------
# Stage 1 -- assignment of predicted events to ground-truth events.
# ---------------------------------------------------------------------
matching:
  hard_constraints:
    - same_day                 # timed: identical day column
    - kind_must_match          # timed<->timed, all_day<->all_day
    - start_gate_min: 90       # timed: |start_pred - start_gt| <= 90 else forbidden
  cost: "cw_start*|dStart_min| + cw_dur*|dDur_min| + cw_title*(1 - title_sim)"
  cost_weights:
    start: 1.0
    duration: 0.5
    title: 30.0
  id_token_tiebreaker: true    # if a model DID read BenchXX, use it to break ties only
  unmatched_ground_truth: false_negative
  unmatched_prediction: false_positive
  notes:
    - "Matching never uses horizontal/column order (it differs across clients)."
    - "BenchXX is never required for a match (it truncates first); tiebreaker only."

# ---------------------------------------------------------------------
# Self-normalization (the core of 'extractable maximum').
# ---------------------------------------------------------------------
self_normalization:
  scope: per_client
  rule: >
    For every component, achievable points exclude any bonus tier the
    client's render cannot expose for that event (clamped duration bonus,
    clamped+displaced start bonus, truncated id bonus). achieved is capped
    at achievable. A perfect extraction of a Notes image therefore scores
    100%, even though some Outlook-only precision was never on offer.

# ---------------------------------------------------------------------
# Aggregation.
# ---------------------------------------------------------------------
aggregation:
  image_score: >
    0.30*S_start + 0.25*S_duration + 0.20*S_title
    + 0.15*S_robustness + 0.10*S_recurrence
    where each S in [0,1] is achieved/achievable, self-normalized per client.
  client_cell: >
    mean of image_score over all images of that client (frontal screenshot,
    frontal photo, horizontal-15deg, vertical-15deg, combined), then mean
    over repeated runs of the same (model+quant, client) cell.
  total: >
    sum(achieved %) / sum(possible %) over client columns that HAVE data.
    Each column max = 100%, so Total = mean of present client cells.
    Adding a new client column later never invalidates existing cells.
  matrix_columns: ["model+quant", "Total", "Outlook", "Notes", "Thunderbird", "..."]

# ---------------------------------------------------------------------
# Rounding -- commercial rounding (round half away from zero) to 2 dp.
# ---------------------------------------------------------------------
rounding:
  mode: half_up
  decimals: 2
  applies_to: ["robustness_component", "image_score", "client_cell", "total"]
