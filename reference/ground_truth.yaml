# =====================================================================
# Visual Calendar Comprehension Benchmark (VCCB)
# reference/ground_truth.yaml  --  SINGLE SOURCE OF TRUTH
#
# This file is consumed by the scorer and by the generators for
# benchmark-week.ics and benchmark_index.md. It MUST NOT be exposed
# to evaluated models (it lives under reference/).
#
# Terminology: 'Recoverable Truth' == 'Extractable Maximum'.
# =====================================================================

benchmark:
  name: "Visual Calendar Comprehension Benchmark"
  abbreviation: "VCCB"
  version: "0.1.0"
  view_window: "08:00-18:00"
  week:
    monday: "2022-01-17"
    tuesday: "2022-01-18"
    wednesday: "2022-01-19"
    thursday: "2022-01-20"
    friday: "2022-01-21"
  canonical_events_count: 35
  visible_blocks:
    outlook: 39   # 32 single timed + 5 Bench20 + 2 all-day (Bench35 = one span bar)
    notes: 40     # same, but Bench35 renders as 2 per-day banners
    thunderbird: 40   # like Notes: Bench35 renders as 2 per-day banners
  clients: ["Outlook", "HCL Notes", "Thunderbird"]
  recoverable_truth_scope: per_client   # derived from client_profiles below

# ---------------------------------------------------------------------
# Recoverable Truth is DERIVED PER CLIENT from these capability profiles
# (measured from screenshots). The scorer selects the profile for the
# client an image belongs to; benchmark_index.md shows the expanded
# per-client bands per event. Tolerances stay provisional until the
# final handheld photos are calibrated.
# ---------------------------------------------------------------------
client_profiles:
  outlook:
    calibration_status: "measured (2022-01 screenshot)"
    px_per_min: 1.0
    min_label_box_px: 29
    precise_time_indicator: true
    duration:
      clamp_below_min: 0
      clamped_base_band: null
      base_tol_min: 15
      bonus_tol_min: 5
    start:
      base_tol_min: 5
      bonus_tol_min: 2
      clamp_displaces_start: false
    multi_day_render: span_bar
    recurrence_icon: true
  notes:
    calibration_status: "measured (2022-01 screenshot)"
    px_per_min: 0.8
    min_label_box_px: 19
    precise_time_indicator: false
    duration:
      clamp_below_min: 30
      clamped_base_band: [5, 30]
      base_tol_min: 15
      bonus_tol_min: 5
    start:
      base_tol_min: 5
      bonus_tol_min: 2
      clamp_displaces_start: false
    multi_day_render: per_day_banner
    recurrence_icon: false
  thunderbird:
    calibration_status: "measured (2022-01 screenshot)"
    px_per_min: 1.26
    min_label_box_px: 23
    precise_time_indicator: false
    duration:
      clamp_below_min: 20
      clamped_base_band: [5, 20]
      base_tol_min: 15
      bonus_tol_min: 5
    start:
      base_tol_min: 5
      bonus_tol_min: 2
      clamp_displaces_start: false
    multi_day_render: per_day_banner
    recurrence_icon: true

derivation: >
  Per client: if precise_time_indicator is false AND duration <=
  clamp_below_min, the event is 'clamped' -> duration earns base credit for
  any value in clamped_base_band and NO precision bonus; start earns base
  credit only (clamping can displace the top edge). Otherwise 'linear' ->
  duration/start base = canonical +/- base_tol_min, bonus = canonical +/-
  bonus_tol_min. Outlook's accent bar makes ALL durations linear
  (precise_time_indicator=true) -- short events stay precisely recoverable
  there; Notes/Thunderbird clamp at 30 min. Multi-day all-day events: span
  is directly recoverable where multi_day_render=span_bar (Outlook);
  per_day_banner clients (Notes) also accept the adjacent-banners answer.

